use_gazebo: true

command_in_type: "speed_units"
scale:
  linear: 0.2
  rotational: 0.3
  joint: 0.01

publish_period: 0.034
command_out_type: "std_msgs/Float64MultiArray"
command_out_topic: /joint_group_velocity_controller/commands

publish_joint_positions: false
publish_joint_velocities: true
publish_joint_accelerations: false

move_group_name: ur_manipulator
planning_frame: base_link
ee_frame_name: tool0
robot_link_command_frame: tool0

cartesian_command_in_topic: /servo_node/delta_twist_cmds
joint_command_in_topic: /servo_node/delta_joint_cmds
joint_topic: /joint_states_servo
status_topic: /servo_node/status

incoming_command_timeout: 0.25
num_outgoing_halt_msgs_to_publish: 4

check_collisions: false

# Relax singularity gating for teleop debugging so twist commands are not fully halted.
lower_singularity_threshold: 100000.0
hard_stop_singularity_threshold: 1000000.0
leaving_singularity_threshold_multiplier: 2.0
joint_limit_margin: 0.1
